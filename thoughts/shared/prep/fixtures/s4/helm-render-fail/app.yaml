apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: helm-render-fail
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://example.com/repo.git
    path: ./
    helm:
      releaseName: fail
  destination:
    server: https://kubernetes.default.svc
    namespace: default
