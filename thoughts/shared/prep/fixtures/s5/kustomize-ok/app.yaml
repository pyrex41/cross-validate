apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kustomize-ok
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://example.com/repo.git
    path: ./
    kustomize:
      namePrefix: overlay-
  destination:
    server: https://kubernetes.default.svc
    namespace: default
