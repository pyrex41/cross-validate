# ServiceAccount + least-privilege ClusterRole for xpcd.
#
# xpcd evaluates the runtime-decidable subset of the Shen kernel in two modes,
# both backed by this one ServiceAccount + ClusterRole:
#
#   - `xpcd serve` (admission webhook). The default subset (the INC-6 safety
#     floor plus the self-contained rules) is *single-object* sound: it decides
#     on the AdmissionReview payload alone. The read-only grants below cover the
#     "ambient-with-cache" tier (CRD/XRD/Composition/Provider schema lookups).
#   - `xpcd watch` (controller sweep, controller-deployment.yaml). Each interval
#     it lists the WHOLE cluster via kubectl (pkg/clustersrc) and runs the
#     ambient subset over the captured world. This is what makes the `get,list`
#     grants below load-bearing rather than merely ambient: the controller
#     actually lists every kind below cluster-wide.
#
# Everything here is read-only (`get`,`list`,`watch`). Nothing grants write,
# patch, delete, or secret access — the controller is observe-only by design.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: xpcd
  namespace: xpc-system
  labels:
    app.kubernetes.io/name: xpcd
    app.kubernetes.io/part-of: xpc
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: xpcd
  labels:
    app.kubernetes.io/name: xpcd
    app.kubernetes.io/part-of: xpc
rules:
  # CRDs — resolve the schema for an admitted managed resource AND let the
  # controller discover which managed-resource CRDs to list (pkg/clustersrc
  # discoverManagedCRDs lists customresourcedefinitions, then lists the matching
  # provider-group kinds dynamically — see the wildcard rule below).
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]
  # XRDs + Compositions — ambient Crossplane type context (and the controller
  # lists these cluster-wide each sweep).
  - apiGroups: ["apiextensions.crossplane.io"]
    resources: ["compositeresourcedefinitions", "compositions"]
    verbs: ["get", "list", "watch"]
  # Providers / Functions / Configurations — provider-capability context.
  - apiGroups: ["pkg.crossplane.io"]
    resources: ["providers", "functions", "configurations"]
    verbs: ["get", "list", "watch"]
  # Applications / ApplicationSets / AppProjects — ambient Argo context for the
  # INC-6 rules. The controller also captures appprojects (pkg/clustersrc
  # fixedTargets includes appprojects.argoproj.io), so it is listed here too.
  - apiGroups: ["argoproj.io"]
    resources: ["applications", "applicationsets", "appprojects"]
    verbs: ["get", "list", "watch"]
  # Managed-resource CRDs (the actual Crossplane MRs: *.aws.upbound.io,
  # *.sql.crossplane.io, *.signoz.crossplane.io, external-secrets.io, ...). The
  # controller does not know these kinds ahead of time — it discovers them at
  # runtime from the CRD list (pkg/clustersrc providerGroupSuffixes) and lists
  # each one cluster-wide. RBAC cannot grant on resources-by-group-suffix, only
  # on a fixed apiGroup or a wildcard, so we grant read-only on `*` resources in
  # these provider apiGroups.
  #
  # Trade-off: `apiGroups: ["*"]` would be one line but over-grants (read on
  # EVERY group, including core). We instead enumerate the known provider groups
  # so the blast radius stays the Crossplane/external-secrets surface the
  # controller actually sweeps. Add a group here when a new provider family is
  # onboarded (mirror pkg/clustersrc providerGroupSuffixes). Still read-only.
  - apiGroups:
      - "aws.upbound.io" # bare provider-family group (ProviderConfig, ...)
      # NOTE: RBAC apiGroups does not support suffix wildcards like
      # "*.aws.upbound.io"; each upjet sub-group is its own apiGroup
      # (ec2.aws.upbound.io, rds.aws.upbound.io, s3.aws.upbound.io, ...). To
      # cover the full upjet surface without enumerating every sub-group, the
      # wildcard entry below is the pragmatic least-bad option; tighten it to an
      # explicit sub-group list if your provider set is small and stable.
      - "*"
    resources: ["*"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: xpcd
  labels:
    app.kubernetes.io/name: xpcd
    app.kubernetes.io/part-of: xpc
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: xpcd
subjects:
  - kind: ServiceAccount
    name: xpcd
    namespace: xpc-system
