# Same orphan shape as positive/, but the rule block carries the explicit
# escape-hatch annotation xpc.io/allow-orphan-sgref, asserting the team has
# accepted the cross-scope-reference risk (e.g. a reaper handles teardown). R36
# must NOT fire.
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: xfargateapp-preview-waived
spec:
  compositeTypeRef:
    apiVersion: platform.facilitygrid.io/v1alpha1
    kind: XFargateApp
  mode: Pipeline
  pipeline:
    - step: render
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $xr := .observed.composite.resource -}}
            {{- $env := $xr.spec.env -}}
            apiVersion: ec2.aws.upbound.io/v1beta1
            kind: SecurityGroup
            metadata:
              name: {{ $xr.metadata.name }}-sg
              labels:
                app.facilitygrid.io/environment: preview
                app.facilitygrid.io/claim-sg: {{ $env }}
            spec:
              providerConfigRef:
                name: preview-account
              forProvider:
                region: us-east-2
                vpcId: vpc-0ff7acc323a348a2e
            ---
            apiVersion: ec2.aws.upbound.io/v1beta1
            kind: SecurityGroupRule
            metadata:
              name: {{ $xr.metadata.name }}-sg-alb-eg-443
              annotations:
                xpc.io/allow-orphan-sgref: "true"
            spec:
              managementPolicies: ["*"]
              providerConfigRef:
                name: preview-account
              forProvider:
                region: us-east-2
                type: egress
                fromPort: 443
                toPort: 443
                protocol: tcp
                sourceSecurityGroupIdSelector:
                  matchLabels:
                    app.facilitygrid.io/claim-sg: {{ $env }}
                securityGroupIdSelector:
                  matchLabels:
                    app.facilitygrid.io/name: fg-preview-alb-sg
