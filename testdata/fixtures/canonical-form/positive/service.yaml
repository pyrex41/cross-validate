# ECS Service whose forProvider.taskDefinition is a bare family ARN (no
# :revision). AWS canonicalizes the read-back to family:revision, so upjet
# sees a permanent diff → reconcile storm. R31 (Tier-1) must fire.
apiVersion: ecs.aws.upbound.io/v1beta1
kind: Service
metadata:
  name: fg-preview-chart-service
  namespace: crossplane-system
spec:
  forProvider:
    region: us-east-2
    cluster: arn:aws:ecs:us-east-2:362836553677:cluster/preview
    taskDefinition: arn:aws:ecs:us-east-2:362836553677:task-definition/fg-preview-chart-service
    launchType: FARGATE
