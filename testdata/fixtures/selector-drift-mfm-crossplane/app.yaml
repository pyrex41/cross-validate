apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: preview-infra
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/example/manifests
    targetRevision: HEAD
    path: preview
  destination:
    server: https://kubernetes.default.svc
    namespace: crossplane-system
  ignoreDifferences:
    - group: "*"
      kind: "*"
      managedFieldsManagers:
        - crossplane
