apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ssa-ok-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/example/manifests
    targetRevision: HEAD
    path: .
  destination:
    server: https://kubernetes.default.svc
    namespace: crossplane-system
  syncPolicy:
    syncOptions:
    - ServerSideApply=true
