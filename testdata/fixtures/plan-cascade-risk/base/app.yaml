apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: preview-alb
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/example/manifests
    targetRevision: HEAD
    path: preview
  destination:
    server: https://kubernetes.default.svc
    namespace: crossplane-system
