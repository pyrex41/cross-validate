apiVersion: apps/v1
kind: Deployment
metadata:
  name: ref-missing-app
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: ref-missing-app
  template:
    metadata:
      labels:
        app: ref-missing-app
    spec:
      containers:
        - name: app
          image: {{ .Values.image }}
