apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rbac-regression-role-delete
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/example/platform.git
    targetRevision: main
    path: manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: default
---
# Role + RoleBinding + Pod all applied at wave 0. The RoleBinding
# SURVIVES into later waves — the cross-step rule cannot rely on
# binding-absent to fire here. What kills RBAC at wave 3 is a
# hook-deleted Role re-assertion: the Role goes away mid-sync, so the
# tightened binding-live? (which now requires BOTH binding AND Role in
# State) returns false, and XPC014 fires. This exercises exactly the
# P4.c gap documented in feedback_kernel_fact_schema_completeness.md —
# the conservative binding-live? (binding-only) could not catch a Role
# hook-deleted under a live binding. The P5.e fact-schema extension
# carries the Role's namespace so the Role key lookup hits.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: worker
  namespace: default
  annotations:
    argocd.argoproj.io/sync-wave: "0"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: worker-role
  namespace: default
  annotations:
    argocd.argoproj.io/sync-wave: "0"
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: worker-binding
  namespace: default
  annotations:
    argocd.argoproj.io/sync-wave: "0"
subjects:
  - kind: ServiceAccount
    name: worker
    namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: worker-role
---
apiVersion: v1
kind: Pod
metadata:
  name: worker-pod
  namespace: default
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  serviceAccountName: worker
  containers:
    - name: app
      image: busybox:1.36
---
# The SAME Role re-asserted at wave 3 with hook-delete-policy. At
# step wave=3 the Role is absent from trajectory state but the Pod
# (and the RoleBinding referencing it) are still present → XPC014.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: worker-role
  namespace: default
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]
