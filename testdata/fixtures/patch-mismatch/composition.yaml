apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: xdatabases.platform.example.com
spec:
  group: platform.example.com
  names:
    kind: XDatabase
    plural: xdatabases
  claimNames:
    kind: Database
    plural: databases
  versions:
    - name: v1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                parameters:
                  type: object
                  properties:
                    region:
                      type: string
                    storageGB:
                      type: string
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: rdsinstances.rds.aws.m.upbound.io
spec:
  group: rds.aws.m.upbound.io
  names:
    kind: RDSInstance
    plural: rdsinstances
  scope: Namespaced
  versions:
    - name: v1beta1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                forProvider:
                  type: object
                  properties:
                    region:
                      type: string
                    allocatedStorage:
                      type: integer
---
# This Composition has a type mismatch:
# spec.parameters.storageGB is string, but forProvider.allocatedStorage is integer
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: xdatabase-default
spec:
  compositeTypeRef:
    apiVersion: platform.example.com/v1
    kind: XDatabase
  resources:
    - name: rds
      base:
        apiVersion: rds.aws.m.upbound.io/v1beta1
        kind: RDSInstance
      patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.region
          toFieldPath: spec.forProvider.region
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.storageGB
          toFieldPath: spec.forProvider.allocatedStorage
