apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dangling-mount-cross-wave-ok
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/example/platform.git
    targetRevision: main
    path: manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: default
---
# ConfigMap applied at wave 0.
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: default
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  key: value
---
# Pod applied at wave 0, non-optional mount of the ConfigMap.
apiVersion: v1
kind: Pod
metadata:
  name: consumer
  namespace: default
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  containers:
    - name: app
      image: busybox:1.36
      volumeMounts:
        - name: cfg
          mountPath: /etc/cfg
  volumes:
    - name: cfg
      configMap:
        name: app-config
---
# ConfigMap re-asserted at wave 2 with hook-delete; Pod is ALSO torn
# down at wave 2 with hook-delete. Both are absent from the wave-2
# trajectory state together, so there is no dangling mount to report.
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: default
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
data:
  key: value
---
apiVersion: v1
kind: Pod
metadata:
  name: consumer
  namespace: default
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  containers:
    - name: app
      image: busybox:1.36
      volumeMounts:
        - name: cfg
          mountPath: /etc/cfg
  volumes:
    - name: cfg
      configMap:
        name: app-config
