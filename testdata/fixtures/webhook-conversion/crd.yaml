apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: buckets.s3.aws.m.upbound.io
spec:
  group: s3.aws.m.upbound.io
  names:
    kind: Bucket
    plural: buckets
  scope: Namespaced
  versions:
    - name: v1beta1
      served: true
      storage: false
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                forProvider:
                  type: object
                  properties:
                    region:
                      type: string
                    tags:
                      type: object
                      additionalProperties:
                        type: string
    - name: v1beta2
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                forProvider:
                  type: object
                  properties:
                    region:
                      type: string
                    tags:
                      type: object
                      additionalProperties:
                        type: string
  conversion:
    strategy: Webhook
    webhook:
      clientConfig:
        service:
          namespace: provider-aws
          name: upbound-provider-aws-conversion-webhook
          path: /convert
