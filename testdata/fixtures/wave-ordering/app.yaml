apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/example/platform.git
    targetRevision: main
    path: manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: default
---
# XRD at wave 0 (should be before any XRs)
apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: xbuckets.platform.example.com
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  group: platform.example.com
  names:
    kind: XBucket
    plural: xbuckets
  versions:
    - name: v1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
---
# XR also at wave 0 — BAD: should be after XRD
apiVersion: platform.example.com/v1
kind: XBucket
metadata:
  name: my-bucket
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  parameters:
    region: us-east-2
