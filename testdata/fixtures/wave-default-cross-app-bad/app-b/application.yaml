apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cross-bad-app-b
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/example/manifests
    targetRevision: HEAD
    path: app-b
  destination:
    server: https://kubernetes.default.svc
    namespace: team-b
---
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: cross-bad-composition
spec:
  compositeTypeRef:
    apiVersion: platform.example.com/v1
    kind: XCrossBad
  mode: Pipeline
  pipeline:
    - step: render
      functionRef:
        name: function-cross-bad
