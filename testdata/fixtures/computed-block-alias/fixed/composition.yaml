# Post-fix (MR !2336) shape: the forward action carries the canonical forward{}
# block (targetGroup[].arnSelector + weight) and an explicit order:. stickiness
# is intentionally omitted (Optional+Computed). AWS reads back exactly this
# block, so forProvider converges → no storm. R34 must stay silent.
#
# Note the target group is referenced via forward.targetGroup[].arnSelector, NOT
# the action-level targetGroupArnSelector alias — so even setting aside the
# present forward{} block, the alias regex does not match.
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: xfargateapp-preview-fixed
spec:
  compositeTypeRef:
    apiVersion: platform.facilitygrid.io/v1alpha1
    kind: XFargateApp
  mode: Pipeline
  pipeline:
    - step: render
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $xr := .observed.composite.resource -}}
            {{- $hostname := $xr.spec.hostname -}}
            apiVersion: elbv2.aws.upbound.io/v1beta1
            kind: LBListenerRule
            spec:
              forProvider:
                region: us-east-2
                listenerArnSelector:
                  matchLabels:
                    app.facilitygrid.io/role: alb-listener
                action:
                  - type: forward
                    order: 1
                    forward:
                      - targetGroup:
                          - arnSelector:
                              matchLabels:
                                app.facilitygrid.io/environment: preview
                                app.facilitygrid.io/hostname: {{ $hostname }}
                                app.facilitygrid.io/role: alb-target-group
                            weight: 1
                condition:
                  - hostHeader:
                      values:
                        - {{ $hostname }}
